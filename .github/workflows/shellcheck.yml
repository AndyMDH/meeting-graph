name: shellcheck

on:
  push:
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck repo scripts
        run: shellcheck install.sh update.sh get.sh vault-template/90-System/doctor.sh
      - name: ShellCheck vault templates
        run: shellcheck vault-template/90-System/run.sh.template vault-template/90-System/quick-capture.sh.template
